name: release

# Publishes @nimble-way/ai-sdk to npm with provenance when a GitHub Release is
# published. Requires the NPM_TOKEN repo secret. Provenance needs id-token:write.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm test

      # Guard against publishing a version that doesn't match the release tag.
      - name: Verify tag matches package.json version
        if: github.event_name == 'release'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) does not match release tag ($TAG)"
            exit 1
          fi

      # --provenance (with id-token:write) attaches a build provenance attestation.
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
